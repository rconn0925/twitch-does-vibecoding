<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twitch Does Vibecoding — Stream Frame (barely-there)</title>
<style>
/* ==========================================================================
   stream-frame.html · 1920x1080 OBS browser source (local file)
   Style: "barely there" — faint corner ticks + small labels only.
   Transparent everywhere else. No external requests. No JS.
   Layer: ABOVE content sources, BELOW the live-data overlay.

   Palette: label backing rgba(15,23,42,0.80), muted text #94A3B8.
   Violet #8B5CF6 (paid-control) and red are NEVER used here.

   Reserved zones never entered (pixel-scan verified = 0):
     R1 top band            x0–1920, y0–140
     R2 bottom-left panel   x48–608, y500–1032
     R3 bottom-right strip  right-anchored, y940–1032  ("NEXT UP")
   ========================================================================== */
  :root{
    --tick: rgba(226,232,240,0.42);   /* faint neutral tick             */
    --halo: rgba(6,10,14,0.55);        /* crisp 1px dark companion       */
    --panel:rgba(15,23,42,0.80);       /* label backing (Dominant)       */
    --muted:#94A3B8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:transparent;overflow:hidden}
  .stage{position:absolute;inset:0;
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,system-ui,sans-serif}

  /* corner ticks — arms point INWARD, so a tick never spills past its corner */
  .t{position:absolute;width:16px;height:16px;pointer-events:none;
     box-shadow:0 0 0 1px var(--halo)}
  .t.tl{border-top:2px solid var(--tick);border-left:2px solid var(--tick)}
  .t.tr{border-top:2px solid var(--tick);border-right:2px solid var(--tick)}
  .t.bl{border-bottom:2px solid var(--tick);border-left:2px solid var(--tick)}
  .t.br{border-bottom:2px solid var(--tick);border-right:2px solid var(--tick)}

  .lbl{position:absolute;display:inline-flex;align-items:center;height:30px;
    padding:0 11px;border-radius:6px;background:var(--panel);color:var(--muted);
    font-size:20px;font-weight:600;letter-spacing:1.5px;line-height:1;white-space:nowrap;
    box-shadow:0 0 0 1px rgba(148,163,184,0.10)}

  /* ---- ZONE A · APP PREVIEW (star)  rect 510,150,900,540 ----------------
     Canvas-centered (center x=960) directly under the phase banner.        */
  #a-tl{left:510px;top:150px}
  #a-tr{left:1394px;top:150px}
  #a-bl{left:510px;top:674px}
  #a-br{left:1394px;top:674px}
  #a-lbl{left:524px;top:164px}

  /* ---- ZONE B · AI TERMINAL  rect 510,710,900,300 ------------------------
     Same left/right edges as the preview. BR tick omitted (R3/NEXT UP
     band — harmless even on scenes running ?nextup=off).                   */
  #b-tl{left:510px;top:710px}
  #b-tr{left:1394px;top:710px}
  #b-bl{left:510px;top:994px}
  #b-lbl{left:524px;top:724px}

  /* ---- ZONE C · TWITCH CHAT  rect 1432,625,440,400 ----------------------
     Shrunk + moved to the LOWER right so the COMMANDS card (Zone E) stacks
     above it in the right column (Ross 2026-07-11). Right edge 1872, width
     matched to Zone E. Bottom ticks sit in the old NEXT UP band — fine here:
     this scene runs the overlay with ?nextup=off.                          */
  #c-tl{left:1432px;top:625px}
  #c-tr{left:1856px;top:625px}
  #c-bl{left:1432px;top:1009px}
  #c-br{left:1856px;top:1009px}
  #c-lbl{left:1446px;top:639px}

  /* ---- ZONE E · COMMANDS  rect 1432,150,440,462 -------------------------
     The static /commands reference card, stacked ABOVE chat in the right
     column (Ross 2026-07-11). Same right edge (1872) + width as Zone C.     */
  #e-tl{left:1432px;top:150px}
  #e-tr{left:1856px;top:150px}
  #e-bl{left:1432px;top:596px}
  #e-br{left:1856px;top:596px}
  #e-lbl{left:1446px;top:164px}

  /* ---- ZONE D · WHAT'S COMING / QUEUE  rect 48,150,440,420 -------------
     Narrowed 550→440 (left rail ends x=488; centered preview starts 510).
     Top ticks only; open bottom (below flows into the R2 vote-panel area). */
  #d-tl{left:50px;top:150px}
  #d-tr{left:472px;top:150px}
  #d-lbl{left:64px;top:164px}
</style>
</head>
<body>
<div class="stage">
  <!-- App preview (star) -->
  <div class="t tl" id="a-tl"></div><div class="t tr" id="a-tr"></div>
  <div class="t bl" id="a-bl"></div><div class="t br" id="a-br"></div>
  <div class="lbl" id="a-lbl">LIVE BUILD</div>

  <!-- AI terminal (widened) -->
  <div class="t tl" id="b-tl"></div><div class="t tr" id="b-tr"></div>
  <div class="t bl" id="b-bl"></div>
  <div class="lbl" id="b-lbl">THE AI</div>

  <!-- Commands reference card (stacked above chat) -->
  <div class="t tl" id="e-tl"></div><div class="t tr" id="e-tr"></div>
  <div class="t bl" id="e-bl"></div><div class="t br" id="e-br"></div>
  <div class="lbl" id="e-lbl">COMMANDS</div>

  <!-- Twitch chat -->
  <div class="t tl" id="c-tl"></div><div class="t tr" id="c-tr"></div>
  <div class="t bl" id="c-bl"></div><div class="t br" id="c-br"></div>
  <div class="lbl" id="c-lbl">CHAT</div>

  <!-- What's coming / queue -->
  <div class="t tl" id="d-tl"></div><div class="t tr" id="d-tr"></div>
  <div class="lbl" id="d-lbl">UP NEXT</div>
</div>
</body>
</html>
